<section class="blog-search">
  <div class="container">
    <div class="row">
      <div class="col-lg-12"><form class="d-flex" action="/blog-search/" method="get" >
  <input
    type="search"
    id="search"
    name="q"
    placeholder="Input your keywords"
    autocomplete="off"
  />
  <button type="submit" style="border-radius:10px;">Search</button>
</form>
</div>
    </div>
  </div>
</section>

<section class="search">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-9">
        <div>
          <h4>Search Results</h4>
          <hr class="mb-5" />
          <ul id="results"></ul>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  
  fetch("/index.json")
    .then((response) => response.json())
    .then((data) => {
      var idx = lunr(function () {
        this.field("title");
        this.field("content");
        this.ref("permalink");

        data.forEach(function (doc) {
          this.add(doc);
        }, this);
      });

      
      var searchParams = new URLSearchParams(window.location.search);
      var query = searchParams.get("q");

      if (query) {
        var results = idx.search(query);

        
        var resultsList = document.getElementById("results");
        resultsList.innerHTML = ""; 
        if (results.length > 0) {
          results.forEach(function (result) {
            var item = data.find((d) => d.permalink === result.ref);
            var li = document.createElement("li");
            li.innerHTML = `<a href="${item.permalink}">${item.title}</a>`;
            resultsList.appendChild(li);
          });
        } else {
          resultsList.innerHTML = "<li>No results found</li>";
        }
      } else {
        document.getElementById("results").innerHTML =
          "<li>Please enter a search query</li>";
      }
    })
    .catch((error) => {
      console.error("Error fetching the search index:", error);
      document.getElementById("results").innerHTML =
        "<li>Error loading search results. Please try again later.</li>";
    });
</script>
